# Pretrain configuration
# The two F8 phase budgets are pinned after the PT5 pilot (on-device); values below are placeholders.
n: 6                      # number of user rungs the interpolator lays
m: 8                      # number of fixed topics

f8:
  pressure_turns: 10      # placeholder, pinned by pilot
  closing_turns: 2        # placeholder, pinned by pilot

loss2:
  tau_min: 0.7            # monotonicity gate
  endpoint_repeats_K: 3   # endpoint separation repeats
  endpoint_allowance: 0   # allowed inversions out of K

gate:
  fidelity_batch_min: 0.90
  topic_pass_ratio_min: 0.80
  converge_consecutive: 3
